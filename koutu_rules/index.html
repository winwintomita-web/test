<script>
(function () {
  const TW = 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/svg/';
  const FLAGS = {
    ja:'1f1ef-1f1f5', en:'1f1fa-1f1f8', zh:'1f1e8-1f1f3',
    ko:'1f1f0-1f1f7', vi:'1f1fb-1f1f3', tl:'1f1f5-1f1ed',
    id:'1f1ee-1f1e9', my:'1f1f2-1f1f2', pt:'1f1f5-1f1f9',
    fr:'1f1eb-1f1f7', it:'1f1ee-1f1f9'
  };
  const btn      = document.getElementById('lang-btn');
  const dropdown = document.getElementById('lang-dropdown');
  const flagImg  = document.getElementById('lang-flag-img');
  const sel      = document.getElementById('lang-select');
  if (!btn) return;
  function setFlag(lang) {
    flagImg.src = TW + (FLAGS[lang] || FLAGS.ja) + '.svg';
    flagImg.alt = lang;
  }
  setFlag(localStorage.getItem('bicycleRulesQuizLang') || 'ja');
  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    const open = dropdown.classList.toggle('open');
    btn.setAttribute('aria-expanded', String(open));
  });
  dropdown.querySelectorAll('[data-lang]').forEach(function (lb) {
    lb.addEventListener('click', function () {
      const lang = lb.dataset.lang;
      setFlag(lang);
      dropdown.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
      localStorage.setItem('bicycleRulesQuizLang', lang);
      sel.value = lang;
      sel.dispatchEvent(new Event('change'));
    });
  });
  document.addEventListener('click', function () {
    dropdown.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  });
})();
</script>
