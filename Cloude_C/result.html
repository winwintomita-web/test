<body>
<div class="app-wrapper"> 
	
	<!-- ヘッダー -->
	<header class="app-header"> <span class="logo-icon">🚨</span>
		<h1>Ket qua</h1>
		<p class="sub-title">Quiz vi pham xe dap</p>
	</header>
	
	<!-- 結果カード -->
	<div class="result-card" id="result-card"> <span class="result-icon" id="result-icon">🎉</span>
		<div class="result-score-display"> <span id="score-num">0</span><span> / <span id="score-total">20</span> cau dung</span> </div>
		<div> <span class="result-rank" id="rank-badge">-</span> </div>
		
		<!-- ドーナツチャート -->
		<div class="result-chart-wrap">
			<canvas id="result-chart" width="260" height="260"></canvas>
		</div>
		
		<!-- メッセージ -->
		<div class="result-message" id="result-message">Dang tai ket qua...</div>
		
		<!-- アクションボタン -->
		<div class="result-actions"> <a href="index.html" class="btn-retry">🔄 Lam lai</a>
			<button class="btn-share" id="btn-share">𝕏 Chia se ket qua</button>
		</div>
		<p class="ex">↓↓ Xem lai cac cau hoi ↓↓</p>
	</div>
	<!-- /result-card --> 
	
	<!-- 広告（中部） -->
	<aside> 
		<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2445184492315800"
     crossorigin="anonymous"></script> 
		<!-- 自転車ルール（HPL app） --> 
		<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-2445184492315800"
     data-ad-slot="9431452902"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins> 
		<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
		</script> 
	</aside>
	
	<!-- 問題振り返り -->
	<div class="review-list" id="review-list">
		<h3>📋 Xem lai cau hoi</h3>
	</div>
	
	<!-- 広告（下部） -->
	<aside> 
		<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2445184492315800"
     crossorigin="anonymous"></script> 
		<!-- 自転車ルール（HPL app） -->

     style="display:block"
     data-ad-client="ca-pub-2445184492315800"

     data-full-width-responsive="true"></ins> 
		<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
		</script> 
	</aside>
	
	<!-- 再挑戦ボタン（下） -->
	<div class="text-center mt-16"> <a href="index.html" class="btn-retry" style="display:inline-block; padding:18px 40px;"> 🔄 Lam lai </a> </div>
	
	<div class="text-center"> <a href="../sign/index.html" class="btn-try"> Thu quiz bien bao tiep theo! </a> </div>
</div>

<small class="copy">&copy; 2026 HPLite</small> 
<script>
(function () {

  /* ---- データ取得 ---- */
  const stored = localStorage.getItem('bicycleRulesQuizResult');
  if (!stored) {
    window.location.href = 'index.html';
    return;
  }
  const result = JSON.parse(stored);
  const { score, total, answers } = result;

  /* ---- スコア表示 ---- */
  document.getElementById('score-num').textContent   = score;
  document.getElementById('score-total').textContent = total;

  /* ---- ランク判定 ---- */
  const pct = score / total;
  let rankClass, rankText, icon, message;

  if (score === total) {
    rankClass = 'rank-perfect';
    rankText  = '🏆 Diem tuyet doi!';
    icon      = '🏆';
    message   = 'Ban lam rat tot! Ban da nam chac cac quy tac quan trong khi di xe dap o Nhat. Hay tiep tuc di xe an toan va chia se kien thuc nay cho nguoi than, ban be.';
  } else if (pct >= 0.8) {
    rankClass = 'rank-great';
    rankText  = '⭐ Rat tot!';
    icon      = '⭐';
    message   = 'Ban da lam rat kha! Chi con mot chut nua la dat diem toi da. Hay xem lai cac cau sai de tranh vi pham khi di xe dap tai Nhat.';
  } else if (pct >= 0.6) {
    rankClass = 'rank-good';
    rankText  = '👍 Kha on!';
    icon      = '👍';
    message   = 'Ban da nam duoc phan co ban, nhung van co mot so diem can on lai. Tu 05/2026, xe dap cung ap dung 青切符, nen hay doc ky giai thich cua cac cau sai.';
  } else {
    rankClass = 'rank-try';
    rankText  = '📖 Can on lai!';
    icon      = '📖';
    message   = 'Ban nen on lai them truoc khi di xe thuong xuyen. Tu 05/2026, theo 改正道路交通法, xe dap co the bi lap 青切符. Hay doc lai giai thich va lam lai quiz.';
  }

  document.getElementById('result-icon').textContent    = icon;
  const badge = document.getElementById('rank-badge');
  badge.textContent = rankText;
  badge.className   = 'result-rank ' + rankClass;
  document.getElementById('result-message').textContent = message;

  /* ---- ドーナツチャート ---- */
  const ctx = document.getElementById('result-chart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Dung', 'Sai'],
      datasets: [{
        data: [score, total - score],
        backgroundColor: ['#43A047', '#EF9A9A'],
        borderColor:     ['#2E7D32', '#E53935'],
        borderWidth: 2,
        hoverOffset: 8,
      }],
    },
    options: {
      cutout: '65%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 14, weight: 'bold', family: "'M PLUS Rounded 1c', sans-serif" },
            padding: 16,
          },
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.parsed} cau`,
          },
        },
      },
      animation: { animateRotate: true, duration: 900 },
    },
    plugins: [{
      id: 'centerText',
      afterDraw(chart) {
        const { width, height, ctx } = chart;
        ctx.save();
        ctx.font = `bold 2rem 'M PLUS Rounded 1c', sans-serif`;
        ctx.fillStyle    = '#B71C1C';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${score}/${total}`, width / 2, height / 2 - 16);
        ctx.font      = `1rem 'M PLUS Rounded 1c', sans-serif`;
        ctx.fillStyle = '#546E7A';
        ctx.fillText('cau dung', width / 2, height / 2 + 18);
        ctx.restore();
      },
    }],
  });

  /* ---- カテゴリ別の色 ---- */
  const catColors = {
    'Vua di xe vua dung dien thoai': '#FF6D00',
    'Ruou bia khi di xe':             '#9C27B0',
    'Vuot den':                       '#E53935',
    'Khong dung han':                 '#E53935',
    'Di nguoc chieu':                 '#1565C0',
    'Can tro nguoi di bo':            '#2E7D32'
  };

  /* ---- 振り返りリスト ---- */
  const reviewContainer = document.getElementById('review-list');

  if (answers && answers.length > 0) {
    answers.forEach((ans, idx) => {
      const isOk = ans.correct;
      const item = document.createElement('div');
      item.className = `review-item${isOk ? '' : ' is-wrong'}`;

      // カテゴリ色
      const catColor = catColors[ans.category] || '#546E7A';

      // 危険シーン画像
      const imgHtml = ans.signImage ? `
        <div class="review-sign-wrap">
          <img class="review-sign-img"
               src="${ans.signImage}"
               alt="${ans.category}"
               onerror="this.style.display='none'">
        </div>` : '';

      // カテゴリバッジ
      const catBadgeHtml = `<span class="review-category" style="background:${catColor}">${ans.category}</span>`;

      // 正誤ヘッダー
      const headerHtml = `
        <div class="review-q-header">
          <span class="review-badge ${isOk ? 'badge-ok' : 'badge-ng'}">${isOk ? '○' : '✕'}</span>
          <span class="review-q-num">Q${idx + 1}</span>
          <span class="review-q-text">${ans.question}</span>
        </div>`;

      // 回答欄
      const answerHtml = `
        <div class="review-answers">
          <p class="review-ans-row ${isOk ? 'ans-ok' : 'ans-ng'}">
            <span class="ans-label">Ban chon</span>
            <span class="ans-value">${isOk ? '✅' : '❌'} ${ans.selectedText}</span>
          </p>
          ${!isOk ? `
          <p class="review-ans-row ans-correct">
            <span class="ans-label">Dap an dung</span>
            <span class="ans-value">⭕ ${ans.correctText}</span>
          </p>` : ''}
        </div>`;

      // 解説＋反則金バッジ
      let expHtml = '';
      if (ans.explanation) {
        const fineMatch    = ans.explanation.match(/Muc phat tham khao:\s*([^。.]+)/i);
        const criminalMatch = ans.explanation.match(/hinh su|懲役|罰金|刑事罰/i);
        const cleanText    = ans.explanation.replace(/Muc phat tham khao:\s*[^。.]+[。.]?/gi, '').trim();
        let badgeHtml = '';
        if (fineMatch) {
          badgeHtml = `<div class="fine-badge">💴 <span class="fine-label">Muc phat tham khao</span>${fineMatch[1]}</div>`;
        } else if (criminalMatch) {
          badgeHtml = `<div class="fine-badge fine-criminal">⚖️ <span class="fine-label">Che tai</span>Co the la xu phat hinh su</div>`;
        }
        expHtml = `<p class="review-explanation">${cleanText}</p>${badgeHtml}`;
      }

      item.innerHTML = imgHtml + catBadgeHtml + headerHtml + answerHtml + expHtml;
      reviewContainer.appendChild(item);
    });
  }

  /* ---- シェアボタン ---- */
  document.getElementById('btn-share').addEventListener('click', () => {
    const text = encodeURIComponent(
      `🚨 Quiz vi pham xe dap tai Nhat\n` +
      `Diem: ${score} / ${total} cau dung ${rankText}\n` +
      `Thu suc ngay! #XeDapNhatBan #青切符 #AnToanGiaoThong`
    );
    const url = encodeURIComponent(window.location.origin + '/rules/index.html');
    window.open(
      `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
      '_blank',
      'noopener,noreferrer'
    );
  });

})();
</script>
</body>
