<div class="app-wrapper"> 
	
	<!-- ヘッダー -->

	<!-- 中間カード -->
	<div class="interstitial-card">
		<h2>🎉 Hoan thanh tat ca cau hoi!</h2>
		<p>Ban da lam xong.<br>
			He thong dang tinh ket qua...</p>
		
		<!-- カウントダウン -->
		<div class="countdown-circle" id="countdown">5</div>
		
		<!-- 結果ボタン（カウント後に表示） -->
		<button class="btn-result" id="btn-result" onclick="goResult()"> Xem ket qua 📊 </button>

<script>
(function () {
  // localStorage にデータがなければトップへ
  if (!localStorage.getItem('bicycleRulesQuizResult')) {
    window.location.href = 'index.html';
    return;
  }

  let count = 5;
  const el = document.getElementById('countdown');
  const btn = document.getElementById('btn-result');

  const timer = setInterval(() => {
    count--;
    el.textContent = count;
    if (count <= 2) {
      btn.classList.add('visible');
    }
    if (count <= 0) {
      clearInterval(timer);
      el.textContent = '✓';
      // 自動遷移
      window.location.href = 'result.html';
    }
  }, 1000);
})();

function goResult() {
  window.location.href = 'result.html';
}
</script>
